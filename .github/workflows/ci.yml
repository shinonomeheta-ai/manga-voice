name: CI

# push / PR で構文チェックとモデル層の軽いスモークテスト(APIキー不要)。
on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies (incl. pytest)
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Byte-compile (syntax check)
        run: |
          python -m compileall -q src
          python -m py_compile streamlit_app.py

      - name: Run tests (offline, no API)
        run: pytest -q

      - name: Validate characters.json
        run: python -c "import json,sys; json.load(open('config/characters.json',encoding='utf-8')); print('characters.json OK')"
